name: Sync printer.cfg, macros.cfg, and electrical docs to docs/_includes and docs/assets
on:
  push:
    paths:
      - "software/Printer Config/printer.cfg"
      - "software/Printer Config/macros.cfg"
      - "electrical/Cable Spec & Wiring Diagram/Vertigo MK1_Cable Spec V03_Rev04.pdf"
      - "electrical/Cable Spec & Wiring Diagram/Vertigo MK1_Wiring Diagram_Rev04.pdf"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Copy cfg files to docs/_includes
        shell: bash
        run: |
          DST_DIR="docs/_includes"

          for file in "printer.cfg" "macros.cfg"; do
            src="software/Printer Config/$file"
            if [ -f "$src" ]; then
              cp -- "$src" "$DST_DIR/$file"
              echo "Copied $src -> $DST_DIR/$file"
            else
              echo "Skipping $file (not found at $src)"
            fi
          done
      - name: Copy PDF files to docs/assets/pdf
        shell: bash
        run: |
          DST_DIR="docs/assets/pdf"
          mkdir -p "$DST_DIR"

          for file in "Vertigo MK1_Cable Spec V03_Rev04.pdf" "Vertigo MK1_Wiring Diagram_Rev04.pdf"; do
            src="electrical/Cable Spec & Wiring Diagram/$file"
            if [ -f "$src" ]; then
              cp -- "$src" "$DST_DIR/$file"
              echo "Copied $src -> $DST_DIR/$file"
            else
              echo "Skipping $file (not found at $src)"
            fi
          done
      - name: Commit and push changes (if any)
        run: |
          git add \
            "docs/_includes/printer.cfg" \
            "docs/_includes/macros.cfg" \
            "docs/assets/pdf/Vertigo MK1_Cable Spec V03_Rev04.pdf" \
            "docs/assets/pdf/Vertigo MK1_Wiring Diagram_Rev04.pdf"
          if git status --porcelain | grep -q "^"; then
            git commit -m "Sync: copy cfg to _includes and PDFs to assets/pdf"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed changes."
          else
            echo "No changes to commit."
          fi
        env:
          GIT_TERMINAL_PROMPT: "0"
