name: Sync printer.cfg and macros.cfg to docs/_includes
on:
  push:
    paths:
      - "software/Printer Config/printer.cfg"
      - "software/Printer Config/macros.cfg"
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Copy printer.cfg and macros.cfg to docs/_includes
        shell: bash
        env:
          SRC_DIR: "software/Printer Config"
          DST_DIR: "docs/_includes"
        run: |
          for file in "printer.cfg" "macros.cfg"; do
            src="$SRC_DIR/$file"
            if [ -f "$src" ]; then
              cp -- "$src" "$DST_DIR/$file"
              echo "Copied $src -> $DST_DIR/$file"
            else
              echo "Skipping $file (not found at $src)"
            fi
          done
      - name: Commit and push changes (if any)
        run: |
          git add docs/_includes/printer.cfg docs/_includes/macros.cfg || true
          if git status --porcelain | grep -q "^"; then
            git commit -m "Sync: copy printer.cfg and macros.cfg to docs/_includes"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed changes."
          else
            echo "No changes to commit."
          fi
        env:
          GIT_TERMINAL_PROMPT: "0"
