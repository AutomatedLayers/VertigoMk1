#####################################################################
#   Includes
#####################################################################
[include mainsail.cfg]
# [include timelapse.cfg]
[include macros.cfg]

#####################################################################
#   MCUs
#####################################################################
[mcu]
canbus_uuid: 758a132d0725                # Manta8P main board

#####################################################################
#   Printer / Motion limits
#####################################################################
[printer]
kinematics: corexy
max_velocity: 1500                       # mm/s
max_accel: 40000                         # mm/s^2
max_z_velocity: 30                       
max_z_accel: 100
square_corner_velocity: 5.0

#####################################################################
#   Host features
#####################################################################
[respond]                                # lets macros print messages to the console

[save_variables]
filename: ~/printer_data/config/config_variables.cfg

[force_move]
enable_force_move: True                  # required by the trapq subset moves (scrape / vertigo homing)

[idle_timeout]
timeout: 6000
gcode:
    TURN_OFF_HEATERS
    DETACH_PROBE                         # NOTE: define this (or remove) -- not in macros.cfg; smart_effector has no dock
    M84

[delayed_gcode on_startup]
initial_duration: 1.0
gcode:
    RESPOND MSG="Welcome to Vertigo!"
    _MACRO_VARIABLES                     # runs once -> converts the mm/s speed vars to mm/min

[exclude_object]                         # object exclusion (cancel individual objects mid-print)

[pause_resume]                           # backs PAUSE/RESUME (used by the scrape-fail prompt + mainsail)

[gcode_arcs]
resolution: 0.2

[input_shaper]
shaper_type_x = mzv
shaper_type_y = mzv
shaper_freq_x = 66.4
shaper_freq_y = 47.0

# [filament_switch_sensor filament]
# pause_on_runout: True
# switch_pin: PF0

#####################################################################
#   X / Y Stepper Settings
#####################################################################
## X Stepper on Motor5 (A Motor)
[stepper_x]
dir_pin: PD7
step_pin: PG9
enable_pin: !PG11
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: ^toolhead:LIMIT_X
position_min: -2.5
position_endstop: 251
position_max: 252.5
homing_speed: 60
homing_accel: 500
homing_retract_dist: 5
homing_positive_dir: True

[tmc5160 stepper_x]
cs_pin: PG10
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
sense_resistor: 0.075
run_current: 2.2                         # abs max ~2.8A (stepper-limited)

## Y Stepper on Motor6 (B Motor)
[stepper_y]
dir_pin: PD3
step_pin: PD4
enable_pin: !PD6
microsteps: 32
rotation_distance: 40
endstop_pin: ^!PC15
full_steps_per_rotation: 200
position_min: -35
position_endstop: 220
position_max: 221
homing_speed: 60
homing_accel: 500
homing_retract_dist: 5
homing_positive_dir: True

[tmc5160 stepper_y]
cs_pin: PD5
spi_software_mosi_pin: PG6
spi_software_miso_pin: PG7
spi_software_sclk_pin: PG8
sense_resistor: 0.075
run_current: 2.2

#####################################################################
#   Z Stepper Settings (4 independent Z; standard enable_pins)
#####################################################################
# FRONT pair = stepper_z (front-left) + stepper_z1 (front-right), joined by the
# flexible lever bar. REAR pair = stepper_z2 (rear-left) + stepper_z3 (rear-right).
# Endstops are at the BOTTOM of travel. Up = NEGATIVE Z. See [vertigo_z_homing].

## Z0 Stepper - Front Left
[stepper_z]
dir_pin: PE5
step_pin: PE6
enable_pin: !PC14                        # active-low EN (was output_pin _z0_en)
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: !PF4
full_steps_per_rotation: 200
position_endstop: 250
position_max: 250
position_min: -153
homing_speed: 15
second_homing_speed: 3
homing_retract_dist: 0
homing_positive_dir: True

[tmc2209 stepper_z]
uart_pin: PC13
interpolate: True
run_current: 1.3
sense_resistor: 0.110
stealthchop_threshold: 0

## Z1 Stepper - Front Right
[stepper_z1]
dir_pin: !PE1
step_pin: PE2
enable_pin: !PE4                         # active-low EN (was output_pin _z1_en)
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: !PF3
full_steps_per_rotation: 200

[tmc2209 stepper_z1]
uart_pin: PE3
interpolate: True
run_current: 1.3
sense_resistor: 0.110
stealthchop_threshold: 0

## Z2 Stepper - Rear Left
[stepper_z2]
dir_pin: PB7
step_pin: PB8
enable_pin: !PE0                         # active-low EN (was output_pin _z2_en)
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: !PF2
full_steps_per_rotation: 200

[tmc2209 stepper_z2]
uart_pin: PB9
interpolate: True
run_current: 1.3
sense_resistor: 0.110
stealthchop_threshold: 0

## Z3 Stepper - Rear Right
[stepper_z3]
dir_pin: !PB3
step_pin: PB4
enable_pin: !PB6                         # active-low EN (was output_pin _z3_en)
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: !PF1
full_steps_per_rotation: 200

[tmc2209 stepper_z3]
uart_pin: PB5
interpolate: True
run_current: 1.3
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Temperature Monitoring (main board)
#####################################################################
[temperature_sensor Manta8P_MCU]
sensor_type: temperature_mcu

[temperature_sensor CB1_HOST]
sensor_type: temperature_host

#####################################################################
#   Toolhead Board (CAN)
#####################################################################
[mcu toolhead]
canbus_uuid: 5db058c66e4a

## Board pin aliases
[board_pins toolhead]
mcu: toolhead
aliases:
aliases_step:
    EXT_EN=gpio14,
    EXT_STEP=gpio7,
    EXT_DIR=gpio6,
    EXT_UART=gpio15
aliases_limitsw:                         # preferred for endstops (incl. klicky)
    # LIMIT_X=gpio20,
    LIMIT_X=gpio22,
    PROBE_TRIGGER=gpio16
aliases_fans:
    FAN1=gpio13,
    FAN0=gpio21
aliases_thermistors:
    TH0=gpio27,
    # EXT_TEMP_CS=gpio17,
    # EXT_TEMP_SCLK=gpio2,
    # EXT_TEMP_MISO=gpio4,
    # EXT_TEMP_MOSI=gpio3
aliases_heaters:
    EXT_HEATER=gpio23
aliases_rgb:
    RGBLED=gpio26
aliases_lis2dw:
    ADXL_CS=gpio12,
    ADXL_SCLK=gpio2,
    ADXL_MISO=gpio4,
    ADXL_MOSI=gpio3

## Toolhead MCU temperature
[temperature_sensor toolhead]
sensor_type: temperature_mcu
sensor_mcu: toolhead

#####################################################################
#   Accelerometer / Resonances
#####################################################################
## https://docs.kalico.gg/Measuring_Resonances.html
[lis2dw]
cs_pin: toolhead:gpio12
spi_software_sclk_pin: toolhead:gpio2
spi_software_mosi_pin: toolhead:gpio3
spi_software_miso_pin: toolhead:gpio4

[resonance_tester]
accel_chip: lis2dw
probe_points: 150, 150, 20               # slightly above the middle of the bed
min_freq: 5
max_freq: 133
accel_per_hz: 75
hz_per_sec: 1

#####################################################################
#   Extruder
#####################################################################
## https://www.klipper3d.org/Config_Reference.html#extruder
[extruder]
## Extruder movement
step_pin: toolhead:EXT_STEP
dir_pin: toolhead:EXT_DIR
enable_pin: !toolhead:EXT_EN
rotation_distance: 4.69                  # per Orbiter V2.0 Spec
microsteps: 32
full_steps_per_rotation: 200             # 1.8deg motor
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
max_extrude_only_accel: 10000            # default 8000
nozzle_diameter: 0.400
filament_diameter: 1.750

## Extruder temperature
heater_pin: toolhead:EXT_HEATER
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: toolhead:TH0
control = pid
pid_kp = 22.684
pid_ki = 2.881
pid_kd = 44.658
pid_version = 1
pid_target = 215.00
pid_tolerance = 0.0200
min_extrude_temp: 90
min_temp: 10
max_temp: 290

[tmc2209 extruder]
uart_pin: toolhead:gpio15
interpolate: False
run_current: 0.85
sense_resistor: 0.110
stealthchop_threshold: 0

[verify_heater extruder]
max_error: 20
check_gain_time: 120
hysteresis: 50
heating_gain: 2

#####################################################################
#   Fans
#####################################################################
[fan]                                    # part cooling
pin: toolhead:gpio21

[heater_fan hotend_fan]
pin: toolhead:gpio13
heater: extruder
heater_temp: 45.0

[fan_generic bed_fans]                   # used during the scrape cool-down
pin: PF7

#####################################################################
#   Bed Heater
#####################################################################
[heater_bed]
heater_pin: PF5                          # SSR Pin - HE1
sensor_type: Generic 3950
sensor_pin: PB1
## Keep max_power within the SSR rating (Omron G3NA-210B-DC5 = 4A no heatsink):
##   4 / (bed_watts / mains_volts) = max_power   (cap at 1.0)
max_power: 1
min_temp: 0
max_temp: 125
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769

#####################################################################
#   Bed Probe (smart effector)
#####################################################################
[smart_effector]
pin: ^!toolhead:PROBE_TRIGGER
x_offset: 0
y_offset: 0
z_offset: 0
speed: 15                                # default 10
samples: 3
sample_retract_dist: 2
lift_speed: 15
samples_result: median
samples_tolerance: 0.020
samples_tolerance_retries: 3
recovery_time: 0.4

#####################################################################
#   Bed Mesh
#####################################################################
[bed_mesh]
speed: 200
horizontal_move_z: 6
mesh_min: 5, 5
mesh_max: 245, 203
probe_count: 5, 5
mesh_pps: 2, 2
move_check_distance: 5
split_delta_z: 0.025
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: lagrange

#####################################################################
#   Z-Tilt (4-point, levels the bed after VERTIGO_HOME_FOR_PRINT)
#####################################################################
[z_tilt]
# Pivot points (nozzle coords) where the bed attaches to each Z stepper, in
# stepper order: stepper_z, stepper_z1, stepper_z2, stepper_z3. The front pair
# shares a pivot (flexible lever bar at center-front).
z_positions:
    125, -18
    125, -18
    2, 283
    242, 283
# Probe points for Z_TILT_ADJUST (nozzle coords; probe must be over the bed).
points:
    125, 5
    5, 203
    245, 203
speed: 200
horizontal_move_z: 10
retries: 4
retry_tolerance: 0.010

#####################################################################
#   Bed Safety Switch
#####################################################################
[gcode_button bed_safety_button]
pin: ^PC4
press_gcode:
    {action_emergency_stop("Impending Doom Averted!")}

#####################################################################
#   Scrape Force Trigger (force_sensor_probe.py)
#####################################################################
[force_sensor_probe]
endstop_name: force_sensor
pin: ^PA7                                # NC switch to GND: pullup, no invert
rear_steppers: stepper_z2, stepper_z3
front_steppers: stepper_z, stepper_z1
scrape_speed: 15.0                       # mm/s, rear-pair travel speed (up & down)
scrape_accel: 100                        # mm/s^2 for the isolated rear-only moves
scrape_threshold_z_pos: 390              # mm TOTAL travel; a trigger at/above this = fully scraped
scrape_distance: 400                     # mm full scrape travel; reaching it (trigger or not) = fully scraped (> threshold)
retries: 3                               # sub-threshold attempts allowed; REFILLS whenever an attempt digs deeper
retry_tolerance: 1.0                     # mm; a gain at/below this doesn't count as progress
max_total_attempts: 20                   # absolute safety cap on total attempts
delay_with_pressure: 1.0                 # s to dwell while still loaded, BEFORE retracting
delay_between_retries: 1.0               # s to dwell AFTER retract, before the next attempt
retract_distance: 5.0                    # mm to back off (descend) between retries
rehome_gcode: _HOME_Z_RAW
# on_scraped_gcode:                       # optional, runs after a successful scrape + home
on_failed_gcode: _SCRAPE_FAIL_MENU       # stuck below threshold -> blocking Mainsail prompt + PAUSE

#####################################################################
#   Vertigo Z Homing (vertigo_z_homing.py)
#####################################################################
# Two-stage Z homing + per-pair calibration jogs for the 4-Z lever-bar mechanism:
#   Z_HOME_FOR_SCRAPE  -> home all four to the bottom (lever disengaged)
#   Z_HOME_FOR_PRINT   -> home to bottom, raise front to engage the lever,
#                         raise rear to couple the bed (ready to print)
#   FORCE_MOVE_Z_FRONT / FORCE_MOVE_Z_REAR DISTANCE=mm [SPEED=mm/s]
#                      -> calibration jog of one pair (other pair holds); leaves Z unhomed
# Each pair moves together on a private trapq while the other pair stays
# energized and holding (no enable-pin toggling). Up direction and the bottom
# home (G28 Z) are fixed in the module, not configurable.
[vertigo_z_homing]
front_steppers: stepper_z, stepper_z1
rear_steppers: stepper_z2, stepper_z3
front_engage_distance: 25                # mm to raise the FRONT pair to engage the lever
rear_couple_distance: 13                 # mm to raise the REAR pair to couple the bed
lift_speed: 25                           # mm/s for the isolated front/rear moves (raises + jogs)
lift_accel: 100                          # mm/s^2 for the isolated front/rear moves
max_print_z: 230                         # optional explicit kinematic Z after print-home
#                                        # (default: post-home Z - front - rear, = old READY_BED result)

#####################################################################
#   LEDs
#####################################################################
[led house_lights]
white_pin: PA4
initial_WHITE: 1.0
