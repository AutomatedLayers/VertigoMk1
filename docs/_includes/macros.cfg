# Wrap Z_TILT_ADJUST and expose it to Mainsail: ready the bed, purge/cool the nozzle to vitrification temp
# so it can't ooze on the probe, then run the native tilt adjust.
[gcode_macro LEVEL_BED]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(macro_vars.default_temp_extruder)|float %}
    {% set vitrification_temp = params.VITRIFICATION_TEMP|default(macro_vars.default_temp_vitrification)|float %}
    RESPOND MSG="Performing a Z tilt adjustment (bed leveling)"

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
    
    {% if (printer.toolhead.position.x != macro_vars.plug_pos_x) or (printer.toolhead.position.y != macro_vars.plug_pos_y) %}
        RESPOND MSG="Heating up the nozzle for cleaning"
        WIPE_PLUG EXTRUDER_TEMP={extruder_temp}
        RESPOND MSG="Cooling to vitrification temperature to prevent ooze"
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={vitrification_temp}   # cool to vitrification
        M106 S255
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={vitrification_temp}
        M106 S0
    {% elif printer.extruder.temperature > vitrification_temp %}
        RESPOND MSG="Cooling to vitrification temperature to prevent ooze"
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={vitrification_temp}   # cool to vitrification
        M106 S255
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={vitrification_temp}
        M106 S0
    {% endif %}

    Z_TILT_ADJUST                               # native tilt adjust
    RESPOND MSG="Bed is experiencing TRUE LEVEL"

# Level first (if needed), then probe a mesh. MANUAL=True saves to a persisted
# manual_mesh profile; MANUAL=False does an adaptive mesh for the current print.
[gcode_macro PROBE_BED_MESH]
gcode:
    {% set save_to_manual_profile = params.MANUAL|default(True)|lower %}
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}

    {% if (not printer.z_tilt.applied) %}
        LEVEL_BED
    {% endif %}

    M204 S{macro_vars.slow_acc}
    {% if save_to_manual_profile == "true" %}
        RESPOND MSG="Probing full bed and saving to manual mesh"
        BED_MESH_CALIBRATE
    {% else %}
        RESPOND MSG="Adaptive Probing"
        BED_MESH_CALIBRATE ADAPTIVE=1
    {% endif %}

    {% if save_to_manual_profile == "true" %}
        BED_MESH_PROFILE SAVE=manual_mesh
        G90
        G1 X{macro_vars.plug_pos_x} Y{macro_vars.plug_pos_y} Z{macro_vars.ready_pos_z} F{macro_vars.speed_z}
        SAVE_CONFIG                              # NOTE: SAVE_CONFIG restarts Klipper
    {% else %}
        BED_MESH_PROFILE SAVE=last_print
    {% endif %}
    M204 S{macro_vars.fast_acc}

# ============================================================================
#  BED MESH -- PER-SURFACE / PER-TEMPERATURE PROFILES
#
#  Saves bed meshes named  mesh_<surface>_<temp>  (e.g. mesh_pei_60,
#  mesh_textured_100) and loads the nearest-temp one for a given surface at
#  print time. Profiles stage with BED_MESH_PROFILE SAVE and persist together
#  on one SAVE_CONFIG, exactly like your manual_mesh flow.
#
#  Macros:
#    BED_MESH_CALIBRATE_SURFACE        -- one (surface, temp) -> mesh_<s>_<t>
#    BED_MESH_CALIBRATE_SURFACE_TEMPS  -- sweep temps for a surface, one SAVE_CONFIG
#    LOAD_MESH_FOR                     -- load nearest saved mesh for surface+temp
#
#  Add these to [gcode_macro _macro_variables]:
#    variable_default_surface: "pei"
#    variable_mesh_temps: [55, 70, 85, 100]
#    variable_mesh_soak_minutes: 5
# ============================================================================


# ---- Calibrate one surface at one temperature -----------------------------
# Ex: BED_MESH_CALIBRATE_SURFACE SURFACE=pei TEMP=60 [SOAK=5] [SAVE=0]
#   SOAK  heat-soak minutes before probing (mesh reflects the print thermal state)
#   SAVE  1 -> SAVE_CONFIG (restart) immediately; leave 0 inside a sweep
[gcode_macro BED_MESH_CALIBRATE_SURFACE]
description: Heat-soak the bed at TEMP, level, probe, and stage mesh 'mesh_<SURFACE>_<TEMP>'.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set raw = params.SURFACE|default(macro_vars.default_surface)|string %}
    {% set surface = macro_vars.bed_type_map.get(raw, raw)|lower|replace(" ", "_") %}
    {% set temp = params.TEMP|default(macro_vars.default_temp_bed)|float %}
    {% set soak = params.SOAK|default(macro_vars.mesh_soak_minutes)|int %}
    {% set vit  = macro_vars.default_temp_vitrification|float %}
    {% set do_save = params.SAVE|default(0)|string|lower in ("1", "true") %}
    {% set name = "mesh_" ~ surface ~ "_" ~ (temp|round|int) %}

    RESPOND MSG="Bed mesh: surface '{surface}' @ {temp|round(1)} C -> profile '{name}'"

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Heat the bed and soak so the mesh matches the printing thermal state.
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={temp}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={temp}
    {% if soak > 0 %}
        RESPOND MSG="Heat-soaking {soak} min at {temp|round(1)} C"
        G4 P{soak * 60000}
    {% endif %}

    # Cool the nozzle so it can't ooze onto the contact-probe points.
    # (If the nozzle may be dirty, run WIPE_PLUG before calling this.)
    {% if printer.extruder.temperature > vit %}
        RESPOND MSG="Cooling nozzle to {vit} C for probing"
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={vit}
        M106 S255
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={vit}
        M106 S0
    {% endif %}

    {% if not printer.z_tilt.applied %}
        Z_TILT_ADJUST
    {% endif %}

    M204 S{macro_vars.slow_acc}
    BED_MESH_CALIBRATE
    M204 S{macro_vars.fast_acc}
    BED_MESH_PROFILE SAVE={name}
    RESPOND MSG="Staged mesh '{name}'. SAVE_CONFIG persists it (and restarts)."

    {% if do_save %}
        SAVE_CONFIG
    {% endif %}


# ---- Sweep several temperatures for one surface ---------------------------
# Ex: BED_MESH_CALIBRATE_SURFACE_TEMPS SURFACE=pei [TEMPS=55,70,85,100] [SOAK=5]
# Long unattended run -- heat-soak + probe per temperature.
[gcode_macro BED_MESH_CALIBRATE_SURFACE_TEMPS]
description: Calibrate + stage meshes for SURFACE across TEMPS, then SAVE_CONFIG once.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set surface = params.SURFACE|default(macro_vars.default_surface)|string|lower %}
    {% set raw = params.TEMPS|default(macro_vars.mesh_temps) %}
    {% if raw is string %}
        {% set temps = raw.split(",")|map("trim")|map("float")|list %}
    {% else %}
        {% set temps = raw|map("float")|list %}
    {% endif %}
    {% set temps = temps|sort %}
    {% set soak = params.SOAK|default(macro_vars.mesh_soak_minutes)|int %}

    {% if temps|length == 0 %}
        RESPOND TYPE=error MSG="BED_MESH_CALIBRATE_SURFACE_TEMPS: no temperatures given"
    {% else %}
        RESPOND MSG="Mesh sweep, surface '{surface}': {temps} C. Long unattended run -- sit tight."
        {% for t in temps %}
            RESPOND MSG="=== mesh {loop.index}/{temps|length}: '{surface}' @ {t|round(1)} C ==="
            BED_MESH_CALIBRATE_SURFACE SURFACE={surface} TEMP={t} SOAK={soak} SAVE=0
        {% endfor %}
        TURN_OFF_HEATERS
        RESPOND MSG="Sweep complete. Issuing SAVE_CONFIG -- Klipper will restart."
        SAVE_CONFIG
    {% endif %}


# ---- Load the nearest saved mesh for a surface + temperature ---------------
# Ex: LOAD_MESH_FOR SURFACE=pei TEMP=60 [FALLBACK=manual_mesh]
# Scans the actually-saved profiles, keeps those named mesh_<surface>_<int>,
# and loads the one whose temp is closest to TEMP.
[gcode_macro LOAD_MESH_FOR]
description: Load the saved bed mesh nearest TEMP for SURFACE.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set raw = params.SURFACE|default(macro_vars.default_surface)|string %}
    {% set surface = macro_vars.bed_type_map.get(raw, raw)|lower|replace(" ", "_") %}
    {% set target = params.TEMP|default(macro_vars.default_temp_bed)|float %}
    {% set fallback = params.FALLBACK|default("manual_mesh")|string %}
    {% set prefix = "mesh_" ~ surface ~ "_" %}
    {% set profiles = printer.bed_mesh.profiles %}

    {% set sel = namespace(best=none, best_diff=none) %}
    {% for pname in profiles %}
        {% if pname.startswith(prefix) %}
            {% set tail = pname[prefix|length:] %}
            {% if tail.isdigit() %}
                {% set d = (tail|int - target)|abs %}
                {% if sel.best_diff is none or d < sel.best_diff %}
                    {% set sel.best = pname %}
                    {% set sel.best_diff = d %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endfor %}

    {% if sel.best is not none %}
        RESPOND MSG="Loading mesh '{sel.best}' for surface '{surface}' @ {target|round(1)} C"
        BED_MESH_PROFILE LOAD={sel.best}
    {% elif fallback in profiles %}
        RESPOND MSG="No '{surface}' mesh near {target|round(1)} C; loading fallback '{fallback}'"
        BED_MESH_PROFILE LOAD={fallback}
    {% else %}
        RESPOND TYPE=error MSG="No mesh for surface '{surface}' and no '{fallback}' profile -- printing without a mesh!"
    {% endif %}

# ‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
