# Prompt: cut the filament before unloading? Branches into _END_UNLOAD_MENU.
[gcode_macro UNLOAD_FILAMENT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
    RESPOND TYPE=command MSG="action:prompt_text Do you want to cut before unloading?"
    RESPOND TYPE=command MSG="action:prompt_text Cutting helps keep the coldside clean. It is recommended unless flexible filament is loaded or will be next."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Cut|_END_UNLOAD_MENU DO_CUT=true|primary"
    RESPOND TYPE=command MSG="action:prompt_button Do Not Cut|_END_UNLOAD_MENU DO_CUT=false|warning"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_LOAD|error"
    RESPOND TYPE=command MSG="action:prompt_show"

