[gcode_macro _MACRO_VARIABLES]
# ---- Ready Z position (absolute) ----
variable_ready_pos_z: 110      # roughly the middle of the Z travel

# ---- Speeds ----
# NOTE: declared in mm/s, then converted to mm/min (x60) in this macro's gcode
# below so they can be used directly as F values. That conversion only happens
# when _MACRO_VARIABLES is RUN, so it must execute once at startup (e.g. from a
# [delayed_gcode] or your first home) or these will still be in mm/s.
variable_speed_xy: 250                          # mm/s -> mm/min after conversion
variable_speed_z: 25                            # mm/s -> mm/min after conversion
variable_fast_acc: 12000                        # mm/s^2
variable_slow_acc: 2000                         # mm/s^2
variable_speed_extrude: 5                       # mm/s -> mm/min after conversion
variable_speed_unload: 20                       # mm/s

# ---- Default temperatures (C) ----
variable_default_temp_extruder: 230             # also update the LOAD_FILAMENT default if changed
variable_default_temp_bed: 55
variable_default_temp_vitrification: 60

# ---- PID tuning temperatures (C) ----
variable_pid_extruder_temps: [200, 220, 240, 260, 270]
variable_pid_bed_temps: [55, 70, 85, 105]

# ---- Filament load prompt temperatures (material, C) ----
variable_load_temps: [["PLA", 220], ["PETG/TPU", 240], ["ABS/ASA", 260], ["PC/PA", 270]]

# ---- Nozzle prime settings ----
variable_prime_pos_x: 1
variable_prime_pos_y: 40
variable_prime_pos_z: 0.1
variable_prime_layer_z_height: 0.3

# ---- Bed scrape settings ----
variable_scrape_max_temp_threshold_default: 35

# ---- Filament cutter settings ----
variable_cut_pos_x: 249.5
variable_cut_pos_y: 18
variable_cut_attach_y_dist: 20
variable_cut_dx: 22
variable_cut_dy: 23

# ---- Purge / wipe / plug settings ----
variable_plug_pos_x: 18
variable_plug_pos_y: -29
# variable_purge_pos_x: 0 #TO BE IMPLEMENTED
# variable_purge_pos_y: 5 #TO BE IMPLEMENTED                
variable_wipe_dist: 15
variable_wipe_speed: 50                          # mm/s -> mm/min after conversion
# variable_purge_dist: 125 #TO BE IMPLEMENTED
# variable_purge_speed: 5 #TO BE IMPLEMENTED                         # mm/s -> mm/min after conversion
variable_wipe_plug_dx: 12.1

# ---- Orca curr_bed_type -> surface token ----
variable_bed_type_map: {"Smooth Cool Plate": "smooth_cool", "Textured Cool Plate": "textured_cool", "Engineering Plate": "engineering", "High Temp Plate": "high_temp", "Textured PEI Plate": "textured_pei", "Cool Plate (SuperTack)": "super_tack"}

# ---- Per-surface / per-temp bed mesh ----
variable_default_surface: "textured_pei"
variable_mesh_temps: [55, 70, 85, 100]
variable_mesh_soak_minutes: 5

# ---- Adaptive bed mesh ----
variable_adaptive_mesh: False      # True -> PRINT_START always adaptive-meshes (ignores per-surface profiles & the prompt)
variable_adaptive_margin: 5        # mm margin around the print area when adaptive

# ---- Timelapse settings ----
# variable_print_timelapse_enabled: False #TO BE IMPLEMENTED
# variable_scrape_timelapse_enabled: False #TO BE IMPLEMENTED

gcode:
    # Dump every variable to the console for quick inspection.
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set out = [] %}
    {% for param, value in macro_vars.items() %}
        {% set dummy = out.append("| %s: %s" % (param, value)) %}
    {% endfor %}
    {action_respond_info("Macro Variables:\n" + out|join("\n"))}

    # ---- Convert the mm/s speeds above into mm/min for F-word use ---- #
    # *** DO NOT CHANGE *** (runs once; see the speeds NOTE above)
    SET_GCODE_VARIABLE MACRO=_MACRO_VARIABLES VARIABLE=speed_xy           VALUE={(macro_vars.speed_xy * 60)}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARIABLES VARIABLE=speed_z            VALUE={(macro_vars.speed_z * 60)}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARIABLES VARIABLE=speed_extrude      VALUE={(macro_vars.speed_extrude * 60)}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARIABLES VARIABLE=wipe_speed         VALUE={(macro_vars.wipe_speed * 60)}
    # SET_GCODE_VARIABLE MACRO=_MACRO_VARIABLES VARIABLE=purge_speed        VALUE={(macro_vars.purge_speed * 60)}
    SET_GCODE_VARIABLE MACRO=_CLIENT_VARIABLE VARIABLE=custom_park_x        VALUE={macro_vars.plug_pos_x}
    SET_GCODE_VARIABLE MACRO=_CLIENT_VARIABLE VARIABLE=custom_park_y        VALUE={macro_vars.plug_pos_y}
    SET_GCODE_VARIABLE MACRO=_CLIENT_VARIABLE VARIABLE=park_at_cancel_x        VALUE={macro_vars.plug_pos_x}
    SET_GCODE_VARIABLE MACRO=_CLIENT_VARIABLE VARIABLE=park_at_cancel_y        VALUE={macro_vars.plug_pos_y}


