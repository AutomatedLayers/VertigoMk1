[gcode_macro _HOME_Z_RAW]
description: Internal -- raw home of all four Z to the bottom endstops, NO print-ready raises.
variable_active: 0
variable_keep_bottom: 0
gcode:
    SET_GCODE_VARIABLE MACRO=_HOME_Z_RAW VARIABLE=active VALUE=1
    G28 Z
    SET_GCODE_VARIABLE MACRO=_HOME_Z_RAW VARIABLE=active VALUE=0

# Exposes Z_HOME_FOR_SCRAPE to Mainsail for calibration.
[gcode_macro DEBUG_HOME_Z]
gcode:
    Z_HOME_FOR_SCRAPE
    
# Custom homing: always home Z first (enabling all four Z motors), then Y, then
# X -- and nudge Y forward before X so the toolhead clears obstructions. This
# only ever homes to the BOTTOM (lever disengaged); it no longer auto-readies
# the bed. Reach the print pose explicitly with Z_HOME_FOR_PRINT (via
# READY_BED / PRINT_START), or the scrape pose with Z_HOME_FOR_SCRAPE.
# The Z steppers have real enable_pins now, so homing energizes them itself.
[homing_override]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set raw = printer["gcode_macro _HOME_Z_RAW"].active|int %}
    {% set req = params.keys()|map('lower')|join %}
    {% set full = not ('x' in req or 'y' in req or 'z' in req) %}
    {% set want_z = full or 'z' in req %}
    {% set want_y = full or 'y' in req %}
    {% set want_x = full or 'x' in req %}
    {% set home_y = want_y or (want_x and 'y' not in printer.toolhead.homed_axes) %}
    {% set keep_bottom = printer["gcode_macro _HOME_Z_RAW"].keep_bottom|int %}

    G91
    {% if raw %}
        # Raw bottom home (Z_HOME_FOR_SCRAPE / force-probe rehome): bottom
        # endstops only, lever disengaged. The ONLY way to stay at the bottom.
        RESPOND MSG="Homing Z to bottom"
        G28 Z
    {% else %}
        RESPOND MSG="Homing"
        # Strict order Z -> Y -> X, and any G28 leaves the bed PRINT-READY.
        {% if want_z %}
            Z_HOME_FOR_PRINT
        {% elif (want_y or want_x) and not printer.vertigo_z_homing.bed_coupled and not keep_bottom %}
          Z_HOME_FOR_PRINT
        {% endif %}
        # Y before X (homed once: explicit, or as a prerequisite for X).
        {% if home_y %}
            G28 Y
        {% endif %}
        # X last. If Y is parked in the filament-cutter zone (cutter sits at
        # ~X{cut_pos_x},Y{cut_pos_y}), move clear before the X sweep crosses it.
        # Skipped when Y was just homed above (it lands clear at its endstop).
        {% if want_x %}
            {% if not home_y and printer.toolhead.position.y < macro_vars.cut_pos_y %}
                G90
                G1 Y{macro_vars.cut_pos_y + 5} F{macro_vars.speed_xy}
                G91
            {% endif %}
            G28 X
        {% endif %}
        RESPOND MSG="Homed"
    {% endif %}


# ============================================================================
#  PRINT / FILAMENT START-END  +  INTERACTIVE BED-MESH RESOLUTION
#
#  Mesh decision happens UP FRONT in PRINT_START -- right after a quick home,
#  while the bed heats in the background -- so the user sees the prompt almost
#  immediately and never waits on the heat-soak/level routine to answer it.
#  The probing itself (if they choose to calibrate) still runs after leveling.
#
#  Why home first: PAUSE parks the toolhead, which errors on an unhomed
#  printer, so the prompt can't safely precede a home. The bed heater is
#  started before homing so the two overlap.
#
#  Shared context lives in _PRINT_CTX; only PREP/PURGE/MODE thread through the
#  prompt buttons. _MESH_RUN does all post-decision work:
#    PREP=1  -> ready-Z, wait for bed, LEVEL_BED   (PRINT_START path)
#    PREP=0  -> assume already hot+leveled          (FILAMENT mid-print path)
#    PURGE=1 -> finish with WIPE_PLUG (also reheats the nozzle)
#
#  "No restart": BED_MESH_CALIBRATE makes the mesh active immediately and
#  BED_MESH_PROFILE SAVE (inside BED_MESH_CALIBRATE_SURFACE, SAVE=0) stages the
#  named profile in memory -- the print continues with no FIRMWARE_RESTART.
#  Run SAVE_CONFIG after the print to persist the profile to disk.
# ============================================================================


# ---- Per-print context shared between the macros below --------------------
[gcode_macro _PRINT_CTX]
variable_surface: "textured_pei"
variable_bed_temp: 55
variable_extruder_temp: 230
variable_vitrification_temp: 60
variable_adaptive: 0
variable_scrape_bed: 1
variable_bed_cool_threshold: 35
gcode:


#  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
#  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ    ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ
#  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ       ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ   ‚Ėą‚Ėą‚ēĎ
#  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ       ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēĎ
#  ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ       ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ
#  ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ       ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ

[gcode_macro PRINT_START]
description: Runs at the start of each print. Example: PRINT_START BED_TEMP=[first_layer_bed_temperature] EXTRUDER_TEMP=[first_layer_temperature] SURFACE="[curr_bed_type]"
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set bed_temp = params.BED_TEMP|default(macro_vars.default_temp_bed)|float %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(macro_vars.default_temp_extruder)|float %}
    {% set vitrification_temp = params.VITRIFICATION_TEMP|default(macro_vars.default_temp_vitrification)|float %}
    {% set raw = params.SURFACE|default(macro_vars.default_surface)|string %}
    {% set surface = macro_vars.bed_type_map.get(raw, raw)|lower|replace(" ", "_") %}
    {% set adaptive = params.ADAPTIVE|default(macro_vars.adaptive_mesh)|string|lower in ("1", "true") %}

    RESPOND MSG="Starting Print"
    G90                                          # absolute coordinates
    M83                                          # extruder relative
    SET_GCODE_OFFSET Z=0                         # clear any leftover filament Z offset

    # Stash context for _MESH_RUN / FILAMENT_START / PRINT_END (surface is a string -> quote idiom).
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=surface VALUE="'{surface}'"
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=bed_temp VALUE={bed_temp}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=extruder_temp VALUE={extruder_temp}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=vitrification_temp VALUE={vitrification_temp}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=adaptive VALUE={1 if adaptive else 0}

    RESPOND MSG="Bed Target Temperature: {bed_temp} C"
    RESPOND MSG="Extruder Target Temperature: {extruder_temp} C"
    RESPOND MSG="Build surface: {surface}"

    # Start the bed heating NOW so it warms during homing + while the user
    # answers the mesh prompt (non-blocking).
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}

    # Quick home -- required before any prompt, because PAUSE parks the toolhead.
    {% if 'z' not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}
    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}

    # Move the bed to the ready position BEFORE the prompt. PAUSE snapshots the
    # toolhead position and RESUME restores it, so the ready-Z move must happen
    # pre-prompt -- otherwise a calibrate (which pauses) restores the post-home
    # Z on resume and drops the bed to the bottom right before printing.
    G90
    G1 Z{macro_vars.ready_pos_z}                 # move bed closer to nozzle

    # Decide the mesh up front. Adaptive toggle on -> always adaptive-mesh (no
    # prompt, ignores per-surface profiles). Off -> load-or-prompt per surface.
    # Heat-soak wait, leveling, and probing happen afterward in _MESH_RUN (PREP=1).
    {% if adaptive %}
        {% set adaptive_margin = params.ADAPTIVE_MARGIN|default(macro_vars.adaptive_margin)|float %}
        _MESH_RUN MODE=adaptive PREP=1 PURGE=1 ADAPTIVE_MARGIN={adaptive_margin}
    {% else %}
        _ENSURE_MESH PREP=1 PURGE=1
    {% endif %}


# ---- Mesh resolution: load nearest within tolerance, else prompt ----------
# Reads surface/temp from _PRINT_CTX. PREP/PURGE are forwarded to _MESH_RUN.
# Ex: _ENSURE_MESH PREP=1 PURGE=1 [TOL=10]
[gcode_macro _ENSURE_MESH]
gcode:
    {% set ctx = printer["gcode_macro _PRINT_CTX"] %}
    {% set surface = ctx.surface|string %}
    {% set target = ctx.bed_temp|float %}
    {% set prep = params.PREP|default(1)|int %}
    {% set purge = params.PURGE|default(1)|int %}
    {% set tol = params.TOL|default(10)|float %}
    {% set prefix = "mesh_" ~ surface ~ "_" %}

    {% set sel = namespace(best=none, best_diff=none) %}
    {% for pname in printer.bed_mesh.profiles %}
        {% if pname.startswith(prefix) %}
            {% set tail = pname[prefix|length:] %}
            {% if tail.isdigit() %}
                {% set d = (tail|int - target)|abs %}
                {% if sel.best_diff is none or d < sel.best_diff %}
                    {% set sel.best = pname %}
                    {% set sel.best_diff = d %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endfor %}

    {% if sel.best is not none and sel.best_diff <= tol %}
        RESPOND MSG="Mesh found: '{sel.best}' ({sel.best_diff|round|int} C from {target|round|int} C)"
        _MESH_RUN MODE=load MESH={sel.best} PREP={prep} PURGE={purge}
    {% else %}
        _MESH_MISSING_PROMPT PREP={prep} PURGE={purge}
    {% endif %}

# Post-decision work. Reads surface/temps from _PRINT_CTX.
# MODE: load (needs MESH=) | calibrate | flat.  PREP: do heat-wait+level.  PURGE: finish w/ WIPE_PLUG.
[gcode_macro _MESH_RUN]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set ctx = printer["gcode_macro _PRINT_CTX"] %}
    {% set mode = params.MODE|string %}
    {% set prep = params.PREP|default(1)|int %}
    {% set purge = params.PURGE|default(1)|int %}
    {% set bed_temp = ctx.bed_temp|float %}
    {% set etemp = ctx.extruder_temp|float %}
    {% set vit = ctx.vitrification_temp|float %}

    {% if prep %}
        G90
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bed_temp}    # wait for the bed (ready-Z already done in PRINT_START)
        LEVEL_BED EXTRUDER_TEMP={etemp} VITRIFICATION_TEMP={vit} # leaves nozzle cooled to vitrification
    {% endif %}

    {% if mode == "load" %}
        BED_MESH_PROFILE LOAD={params.MESH}
    {% elif mode == "calibrate" %}
        # Calibrate + stage the profile, NO SAVE_CONFIG (mesh is live this session).
        BED_MESH_CALIBRATE_SURFACE SURFACE={ctx.surface} TEMP={bed_temp} SAVE=0
        RESPOND MSG="Mesh staged. Run SAVE_CONFIG after the print to keep it permanently."
    {% elif mode == "adaptive" %}
        # Per-print adaptive mesh over the print area (uses exclude_object regions
        # from the slicer -- enable "Label objects" in Orca). Not saved; ephemeral.
        {% set margin = params.ADAPTIVE_MARGIN|default(macro_vars.adaptive_margin)|float %}
        RESPOND MSG="Adaptive bed mesh (margin {margin} mm)"
        BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN={margin}
    {% else %}
        RESPOND MSG="Printing without a bed mesh (assuming flat)."
        BED_MESH_CLEAR
    {% endif %}

    {% if purge %}
        G90
        G1 X{macro_vars.plug_pos_x} Y{macro_vars.plug_pos_y} F{macro_vars.speed_xy}
        WIPE_PLUG EXTRUDER_TEMP={etemp}                          # reheats the nozzle and purges
    {% elif mode in ("calibrate", "adaptive") %}
        # Calibration cooled the nozzle and there's no purge to reheat it.
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={etemp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={etemp}
    {% endif %}

    {% if printer.pause_resume.is_paused %}
        RESUME
    {% endif %}

# Prompt shown when no mesh exists within tolerance. PAUSE holds the print
# until the user answers; buttons forward PREP/PURGE to _MESH_RUN.
[gcode_macro _MESH_MISSING_PROMPT]
gcode:
    {% set ctx = printer["gcode_macro _PRINT_CTX"] %}
    {% set prep = params.PREP|default(1)|int %}
    {% set purge = params.PURGE|default(1)|int %}
    RESPOND TYPE=command MSG="action:prompt_begin No Bed Mesh"
    RESPOND TYPE=command MSG="action:prompt_text No saved mesh for surface '{ctx.surface}' within range of {ctx.bed_temp|round|int} C."
    RESPOND TYPE=command MSG="action:prompt_text Calibrate one now for this surface and temperature, or print on a flat bed?"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Calibrate now|_MESH_PROMPT_YES PREP={prep} PURGE={purge}|primary"
    RESPOND TYPE=command MSG="action:prompt_button Print flat|_MESH_PROMPT_NO PREP={prep} PURGE={purge}|warning"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"
    PAUSE

[gcode_macro _MESH_PROMPT_YES]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _MESH_RUN MODE=calibrate PREP={params.PREP|default(1)|int} PURGE={params.PURGE|default(1)|int}

[gcode_macro _MESH_PROMPT_NO]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _MESH_RUN MODE=flat PREP={params.PREP|default(1)|int} PURGE={params.PURGE|default(1)|int}

# ============================================================================
#  Relative prime line Prime Line
[gcode_macro _prime_line_01]
gcode:
  {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
  {% set x = params.X|default(macro_vars.prime_pos_x)|float %}
  {% set y = params.Y|default(macro_vars.prime_pos_y)|float %}
 
  G90
  G1 X{x} Y{y}  F{macro_vars.speed_xy} #NOZZLE START POSITION
  G1 Z{macro_vars.prime_pos_z} F{macro_vars.speed_z} #Plug nozzle on bed
 
  ;Relative coordinates
  G91
  ;Extruder relative coordinates
  M83 
  ;Reset extruder position
  G92 E0
  ;Prime shape
  G1 F800
  G1 Z{macro_vars.prime_layer_z_height}
  G1 Y100 E25
  G1 Z{macro_vars.prime_layer_z_height}
  G1 Y-100 E25
  G1 Z{macro_vars.prime_layer_z_height}
  G1 Y100 E25
  ;end prime shape
  
