# ██╔════╝██║██║     ██╔══██╗████╗ ████║██╔════╝████╗  ██║╚══██╔══╝
# █████╗  ██║██║     ███████║██╔████╔██║█████╗  ██╔██╗ ██║   ██║
# ██╔══╝  ██║██║     ██╔══██║██║╚██╔╝██║██╔══╝  ██║╚██╗██║   ██║
# ██║     ██║███████╗██║  ██║██║ ╚═╝ ██║███████╗██║ ╚████║   ██║
# ╚═╝     ╚═╝╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝╚══════╝╚═╝  ╚═══╝   ╚═╝

# Prompt: cut the filament before unloading? Branches into _END_UNLOAD_MENU.
[gcode_macro UNLOAD_FILAMENT]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
    RESPOND TYPE=command MSG="action:prompt_text Do you want to cut before unloading?"
    RESPOND TYPE=command MSG="action:prompt_text Cutting helps keep the coldside clean. It is recommended unless flexible filament is loaded or will be next."
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Cut|_END_UNLOAD_MENU DO_CUT=true|primary"
    RESPOND TYPE=command MSG="action:prompt_button Do Not Cut|_END_UNLOAD_MENU DO_CUT=false|warning"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_LOAD|error"
    RESPOND TYPE=command MSG="action:prompt_show"

# Prompt: pick a filament type, then hand off to _HEATING_PROMPT.
[gcode_macro LOAD_FILAMENT]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set pairs = macro_vars.load_temps %}

    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Select your filament type to begin heating:"
    {% for label, t in pairs %}
        RESPOND TYPE=command MSG="action:prompt_button {label} - {t|round|int} C|_HEATING_PROMPT EXTRUDER_TEMP={t|round|int}|warning"
    {% endfor %}
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_LOAD|error"
    RESPOND TYPE=command MSG="action:prompt_show"

# Finish the unload: optionally cut, then back the filament out of the hotend.
[gcode_macro _END_UNLOAD_MENU]
gcode:
    {% set do_cut = params.DO_CUT %}

    {% if do_cut %}
        CUT_FILAMENT
        M83
        G92 E0
        FORCE_MOVE STEPPER=extruder DISTANCE=-70 VELOCITY=20   # FORCE_MOVE bypasses min_extrude_temp
        G92 E0
    {% else %}
        # no cut requested
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_end"

# Drive the toolhead to the cutter, insert the lever, snip, and detach.
[gcode_macro CUT_FILAMENT]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}

    # Ensure axes are homed
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Make sure the toolhead doesn't ram the lever on approach
    G90
    {% if printer.toolhead.position.y < macro_vars.cut_pos_y %}
        G1 Y{macro_vars.cut_pos_y} F{macro_vars.speed_xy}
    {% endif %}

    # Position toolhead at the cutter
    G1 X{macro_vars.cut_pos_x} Y{macro_vars.cut_pos_y} F{macro_vars.speed_xy}

    # Insert lever
    G91
    G1 Y-{macro_vars.cut_attach_y_dist} F{macro_vars.speed_xy / 2}

    # Relieve pressure before the cut. FORCE_MOVE so this also works cold
    # (the razor is upstream of the hotend, so cutting cold is fine).
    G92 E0
    FORCE_MOVE STEPPER=extruder DISTANCE=-.2 VELOCITY=25
    G92 E0
    
    # Cut filament (slow accel for the chop, then restore)
    M204 S{macro_vars.slow_acc}
    G1 X-{macro_vars.cut_dx} Y-{macro_vars.cut_dy} F{macro_vars.speed_xy / 2}
    G1 X{macro_vars.cut_dx} Y{macro_vars.cut_dy} F{macro_vars.speed_xy / 2}
    M204 S{macro_vars.fast_acc}

    # Detach from lever
    G1 Y{macro_vars.cut_attach_y_dist} F{macro_vars.speed_xy}
    G90

    # # extra moves if nozzle is hot
    # {% if (printer.extruder.temperature > printer.configfile.settings.extruder.min_temp) %}
    #     WIPE_PLUG
    # {% endif %}

# Home (if needed), start heating. Already hot -> extrude menu now; otherwise
# show the heating prompt and poll until target, then extrude menu. The
# positioning move is deferred to _EXTRUDE_MENU.
[gcode_macro _HEATING_PROMPT]
variable_active: 0
variable_target_temp: 0
variable_ready_tolerance: 1.0          # within this many C of target counts as "ready"
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(macro_vars.default_temp_extruder)|float %}
    {% set tol = printer["gcode_macro _HEATING_PROMPT"].ready_tolerance|float %}
    {% set ready_now = printer.extruder.temperature >= (extruder_temp - tol) %}
 
    # Home (the extrude-menu move below needs a homed printer).
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}
 
    # Start heating (non-blocking)
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
 
    SET_GCODE_VARIABLE MACRO=_HEATING_PROMPT VARIABLE=target_temp VALUE={extruder_temp}
 
    {% if ready_now %}
        # Already at temp -> go straight to the extrude menu (clears active itself).
        _EXTRUDE_MENU
    {% else %}
        SET_GCODE_VARIABLE MACRO=_HEATING_PROMPT VARIABLE=active VALUE=1
        _HEATING_PROMPT_SHOW
        UPDATE_DELAYED_GCODE ID=_HEATING_PROMPT_WAIT DURATION=1
    {% endif %}
 
# Show the "heating" prompt (Cancel only). Rendered once; the poll replaces it
# with the extrude menu when the extruder reaches temp.
[gcode_macro _HEATING_PROMPT_SHOW]
gcode:
    {% set hp = printer["gcode_macro _HEATING_PROMPT"] %}
    {% set target = hp.target_temp|float %}
    RESPOND TYPE=command MSG="action:prompt_begin Heating Extruder"
    RESPOND TYPE=command MSG="action:prompt_text Heating the extruder to {target|round|int} C."
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_LOAD|error"
    RESPOND TYPE=command MSG="action:prompt_show"
 
# Silent 1 Hz poll -- NO re-render while heating. When the extruder reaches
# target, it opens the extrude menu directly (which clears active) and stops.
[delayed_gcode _HEATING_PROMPT_WAIT]
gcode:
    {% set hp = printer["gcode_macro _HEATING_PROMPT"] %}
    {% if hp.active|int %}
        {% if printer.extruder.temperature >= (hp.target_temp|float - hp.ready_tolerance|float) %}
            _EXTRUDE_MENU          # at temp -> straight to the extrude menu
        {% else %}
            UPDATE_DELAYED_GCODE ID=_HEATING_PROMPT_WAIT DURATION=1   # keep polling silently
        {% endif %}
    {% endif %}

# Front-and-center positioning, evaluated post-home. Only lowers the bed to
# prompt_z if it's currently CLOSER than that (z < prompt_z); after a fresh
# home the bed is at max_print_z, so this just does the XY move.
[gcode_macro _HEATING_PROMPT_MOVE]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set mid_x = (printer.toolhead.axis_maximum.x - printer.toolhead.axis_minimum.x) / 2 %}
    {% set prompt_z = (printer.configfile.settings.vertigo_z_homing.max_print_z|default(printer.toolhead.axis_maximum.z, true)) / 2 %}
 
    G90
    {% if printer.toolhead.position.x > (macro_vars.cut_pos_x - 10) %}
        G1 X{(macro_vars.cut_pos_x - 10)} F{macro_vars.speed_xy}
    {% endif %}
    {% if printer.toolhead.position.z < prompt_z %}
        G1 X{mid_x} Y{printer.toolhead.axis_minimum.y} Z{prompt_z} F{macro_vars.speed_z}
    {% else %}
        G1 X{mid_x} Y{printer.toolhead.axis_minimum.y} F{macro_vars.speed_xy}
    {% endif %}

# Prompt: extrude in bursts until clean, then finish with WIPE_PLUG.
# Clears `active` so a queued poll can't re-show the heat prompt over this menu.
# Positions the toolhead/bed (if needed) just before the menu appears, then
# shows the extruder temperature (snapshot at the moment the menu opens).
[gcode_macro _EXTRUDE_MENU]
gcode:
    SET_GCODE_VARIABLE MACRO=_HEATING_PROMPT VARIABLE=active VALUE=0   # stop the heat-prompt poll
    _HEATING_PROMPT_MOVE                                              # position just before the menu appears
    M400                                                              # finish the move before the menu shows
    RESPOND TYPE=command MSG="action:prompt_begin Extrude Filament"
    RESPOND TYPE=command MSG="action:prompt_text Extruder: {printer.extruder.temperature|round(1)} C (target {printer.extruder.target|round|int} C)"
    RESPOND TYPE=command MSG="action:prompt_text Click 'Extrude' until filament is coming out of the nozzle"
    RESPOND TYPE=command MSG="action:prompt_button Extrude|_LOAD_EXTRUDE|warning"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done|WIPE_PLUG|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_CANCEL_LOAD|error"
    RESPOND TYPE=command MSG="action:prompt_show"

# Cancel any load/heat flow: close the prompt and turn the extruder off.
# Clears `active` so a queued poll can't re-show the heat prompt.
[gcode_macro _CANCEL_LOAD]
gcode:
    SET_GCODE_VARIABLE MACRO=_HEATING_PROMPT VARIABLE=active VALUE=0   # stop the heat-prompt poll
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_HEATER_TEMPERATURE HEATER=extruder       # turn off extruder heater

[gcode_macro _LOAD_EXTRUDE]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    M83
    G92 E0
    G1 E50 F{macro_vars.speed_extrude}
    G92 E0

# Wipe the nozzle, then plug it against the bed at the plug position.
[gcode_macro WIPE_PLUG]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(macro_vars.default_temp_extruder)|float %}

    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp} # Heat the extruder to first layer temp 
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp} # Wait for extruder to be at first layer temp
    G90
    {% if printer.toolhead.position.x != macro_vars.plug_pos_x or printer.toolhead.position.y != macro_vars.plug_pos_y %}
        G1 X{printer.toolhead.axis_minimum.x} Y{macro_vars.plug_pos_y + 20} F{macro_vars.speed_xy}
        G1 Y{macro_vars.plug_pos_y} F{macro_vars.speed_xy}
    {% endif %}

    _WIPE_NOZZLE
    G1 X{macro_vars.plug_pos_x} F{macro_vars.speed_xy}

# Side-to-side wipe across the brush/pad.
[gcode_macro _WIPE_NOZZLE]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    RESPOND MSG="Wiping the nozzle"
    G90
    G1 X{macro_vars.plug_pos_x - macro_vars.wipe_plug_dx + macro_vars.wipe_dist / 2} F{macro_vars.wipe_speed}
    G91
    G1 X-{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X-{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X-{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G1 X-{macro_vars.wipe_dist} F{macro_vars.wipe_speed}
    G90
    G92 E0

# Heat the nozzle to EXTRUDER_TEMP, wipe it clean at the plug, then cool it to
# VITRIFICATION_TEMP (fan-assisted) so it can't ooze onto the contact probe.
# Blocking by design -- but it's safe to start while the BED is still heating,
# since the bed heater runs in the background. That overlap is the whole point:
# the nozzle cool-down is the slow step, so we hide it under the bed soak.
[gcode_macro _CLEAN_AND_COOL_NOZZLE]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(macro_vars.default_temp_extruder)|float %}
    {% set vitrification_temp = params.VITRIFICATION_TEMP|default(macro_vars.default_temp_vitrification)|float %}
 
    RESPOND MSG="Heating up the nozzle for cleaning"
    WIPE_PLUG EXTRUDER_TEMP={extruder_temp}                      # heats + wipes at the plug
    RESPOND MSG="Cooling to vitrification temperature: {vitrification_temp} to prevent ooze"
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={vitrification_temp}   # cool to vitrification
    M106 S255
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={vitrification_temp}
    M106 S0


