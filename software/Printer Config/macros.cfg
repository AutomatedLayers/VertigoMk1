# ============================================================================
#  HEATER PID -- PER-TEMPERATURE PROFILES  (Kalico)  -- extruder OR bed
#
#  Tunes a heater's PID at several temperatures and saves a named profile for
#  each (<prefix>_<temp>), then optionally loads the nearest one at print time.
#  Pass HEATER=extruder or HEATER=bed. Profiles stage via PID_PROFILE SAVE and
#  persist together on a single SAVE_CONFIG (like bed-mesh profiles).
#
#  Macros:
#    PID_TUNE_HEATER        -- one temp -> profile <prefix>_<temp>
#    PID_TUNE_HEATER_TEMPS  -- sweep a list, then one SAVE_CONFIG
#    LOAD_PID_FOR_TEMP      -- load the nearest saved profile for a target
#
#  HEATER token mapping:
#    extruder -> heater 'extruder',   profile prefix 'extruder', temps pid_extruder_temps
#    bed      -> heater 'heater_bed',  profile prefix 'bed',      temps pid_bed_temps
#
#  Add these to [gcode_macro _macro_variables]:
#    variable_pid_extruder_temps: [200, 220, 240, 260, 280]
#    variable_pid_bed_temps: [55, 70, 85, 100]
#
#  "PID how you print": FAN is the print-side disturbance fan for that heater --
#  the part-cooling fan for the extruder, the bed/aux fans for the bed. The
#  other fan and the *other* heater are turned off during the test.
# ============================================================================


# ---- One temperature -------------------------------------------------------
# Ex: PID_TUNE_HEATER HEATER=extruder TEMP=240 [TOLERANCE=0.02] [FAN=0] [WRITE_FILE=0] [SAVE=0]
#     PID_TUNE_HEATER HEATER=bed TEMP=60
[gcode_macro PID_TUNE_HEATER]
description: Calibrate PID for HEATER (extruder|bed) at TEMP and stage profile <prefix>_<TEMP>.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set h = params.HEATER|default("extruder")|lower %}
    {% set ns = namespace(hname=none, prefix=none, other=none, is_ext=false) %}
    {% if h in ("extruder", "e") %}
        {% set ns.hname = "extruder" %}{% set ns.prefix = "extruder" %}{% set ns.other = "heater_bed" %}{% set ns.is_ext = true %}
    {% elif h in ("bed", "heater_bed", "b") %}
        {% set ns.hname = "heater_bed" %}{% set ns.prefix = "bed" %}{% set ns.other = "extruder" %}{% set ns.is_ext = false %}
    {% endif %}

    {% if ns.hname is none %}
        RESPOND TYPE=error MSG="HEATER must be 'extruder' or 'bed' (got '{h}')"
    {% else %}
        {% set temp = params.TEMP|float %}
        {% set name = ns.prefix ~ "_" ~ (temp|round|int) %}
        {% set tol  = params.TOLERANCE|default(0.02)|float %}
        {% set fan  = params.FAN|default(0)|float %}
        {% set wf   = params.WRITE_FILE|default(0)|int %}
        {% set do_save = params.SAVE|default(0)|string|lower in ("1", "true") %}

        RESPOND MSG="PID tuning {ns.hname} @ {temp|round(1)} C -> profile '{name}' (tol {tol})"

        # Minimize disturbances: turn off the *other* heater.
        SET_HEATER_TEMPERATURE HEATER={ns.other} TARGET=0
        # Hold the print-side fan for this heater at FAN%, silence the other fan.
        {% if ns.is_ext %}
            SET_FAN_SPEED FAN=bed_fans SPEED=0                    # aux fans off
            M106 S{(fan / 100.0 * 255)|round|int}                # part fan = print disturbance
        {% else %}
            M107                                                 # part fan off
            SET_FAN_SPEED FAN=bed_fans SPEED={fan / 100.0}       # bed/aux fans = print disturbance
        {% endif %}

        PID_CALIBRATE HEATER={ns.hname} TARGET={temp} TOLERANCE={tol}{% if wf %} WRITE_FILE=1{% endif %}

        PID_PROFILE SAVE={name} HEATER={ns.hname}
        RESPOND MSG="Staged PID profile '{name}'. SAVE_CONFIG will persist it (and restart)."

        # Leave everything cold and quiet.
        M107
        SET_FAN_SPEED FAN=bed_fans SPEED=0
        SET_HEATER_TEMPERATURE HEATER={ns.hname} TARGET=0

        {% if do_save %}
            SAVE_CONFIG
        {% endif %}
    {% endif %}


# ---- Sweep several temperatures -------------------------------------------
# Ex: PID_TUNE_HEATER_TEMPS HEATER=extruder [TEMPS=200,220,240] [TOLERANCE=0.02] [FAN=0]
#     PID_TUNE_HEATER_TEMPS HEATER=bed
# Calibrates each temp (ascending), stages a profile per temp, then SAVE_CONFIG
# once. Long unattended run -- minutes per temp for the extruder, considerably
# longer per temp for the high-thermal-mass bed.
[gcode_macro PID_TUNE_HEATER_TEMPS]
description: Calibrate + stage PID for HEATER (extruder|bed) across TEMPS, then SAVE_CONFIG.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set h = params.HEATER|default("extruder")|lower %}
    {% set ns = namespace(hname=none, temps=none) %}
    {% if h in ("extruder", "e") %}
        {% set ns.hname = "extruder" %}{% set ns.temps = macro_vars.pid_extruder_temps %}
    {% elif h in ("bed", "heater_bed", "b") %}
        {% set ns.hname = "heater_bed" %}{% set ns.temps = macro_vars.pid_bed_temps %}
    {% endif %}

    {% if ns.hname is none %}
        RESPOND TYPE=error MSG="HEATER must be 'extruder' or 'bed' (got '{h}')"
    {% else %}
        {% set raw = params.TEMPS|default(ns.temps) %}
        {% if raw is string %}
            {% set temps = raw.split(",")|map("trim")|map("float")|list %}
        {% else %}
            {% set temps = raw|map("float")|list %}
        {% endif %}
        {% set temps = temps|sort %}                 # ascending = less reheating between runs
        {% set tol = params.TOLERANCE|default(0.02)|float %}
        {% set fan = params.FAN|default(0)|float %}

        {% if temps|length == 0 %}
            RESPOND TYPE=error MSG="PID_TUNE_HEATER_TEMPS: no temperatures given"
        {% else %}
            RESPOND MSG="{ns.hname} PID sweep (ascending): {temps} C. Long unattended run -- sit tight."
            {% for t in temps %}
                RESPOND MSG="=== PID {loop.index}/{temps|length} @ {t|round(1)} C ==="
                PID_TUNE_HEATER HEATER={h} TEMP={t} TOLERANCE={tol} FAN={fan} SAVE=0
            {% endfor %}
            RESPOND MSG="Sweep complete. Issuing SAVE_CONFIG -- Klipper will restart."
            SAVE_CONFIG
        {% endif %}
    {% endif %}


# ---- Load nearest profile for a target temp -------------------------------
# Ex: LOAD_PID_FOR_TEMP HEATER=extruder TEMP=240 [KEEP_TARGET=0] [FALLBACK=default]
#     LOAD_PID_FOR_TEMP HEATER=bed TEMP=60
[gcode_macro LOAD_PID_FOR_TEMP]
description: Load the saved PID profile for HEATER (extruder|bed) nearest TEMP.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set h = params.HEATER|default("extruder")|lower %}
    {% set ns = namespace(hname=none, prefix=none, temps=none, deftarget=0) %}
    {% if h in ("extruder", "e") %}
        {% set ns.hname = "extruder" %}{% set ns.prefix = "extruder" %}{% set ns.temps = macro_vars.pid_extruder_temps %}{% set ns.deftarget = macro_vars.default_temp_extruder %}
    {% elif h in ("bed", "heater_bed", "b") %}
        {% set ns.hname = "heater_bed" %}{% set ns.prefix = "bed" %}{% set ns.temps = macro_vars.pid_bed_temps %}{% set ns.deftarget = macro_vars.default_temp_bed %}
    {% endif %}

    {% if ns.hname is none %}
        RESPOND TYPE=error MSG="HEATER must be 'extruder' or 'bed' (got '{h}')"
    {% else %}
        {% set target = params.TEMP|default(ns.deftarget)|float %}
        {% set fallback = params.FALLBACK|default("default")|string %}
        {% set keep = params.KEEP_TARGET|default(0)|int %}

        {% set sel = namespace(best=none, best_diff=none) %}
        {% for t in ns.temps %}
            {% set d = (t|float - target)|abs %}
            {% if sel.best_diff is none or d < sel.best_diff %}
                {% set sel.best = t %}
                {% set sel.best_diff = d %}
            {% endif %}
        {% endfor %}

        {% if sel.best is not none %}
            {% set name = ns.prefix ~ "_" ~ (sel.best|round|int) %}
            RESPOND MSG="Loading PID profile '{name}' for {target|round(1)} C {ns.hname} target"
            PID_PROFILE LOAD={name} HEATER={ns.hname} DEFAULT={fallback} KEEP_TARGET={keep} VERBOSE=LOW
        {% else %}
            RESPOND MSG="No temps configured for {ns.hname}; loading '{fallback}'"
            PID_PROFILE LOAD={fallback} HEATER={ns.hname} KEEP_TARGET={keep} VERBOSE=LOW
        {% endif %}
    {% endif %}


