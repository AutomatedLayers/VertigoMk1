# Orchestrates a full bed clear. The scrape itself is SCRAPE_BED_PROBE
# (force_sensor_probe.py); this wrapper makes sure the toolhead is parked clear
# first, then gates the scrape on an OPTIONAL cool-down. The bed fans only run
# when cooling is actually needed:
#   - BED_COOL_THRESHOLD given and bed above it -> fans on, wait, fans off
#   - BED_COOL_THRESHOLD given and bed already below it -> scrape now (no fans)
#   - no BED_COOL_THRESHOLD -> scrape now (no fans)
[gcode_macro SCRAPE_BED]
description: Park clear, (optionally) cool the bed with fans, then run the rear-Z force-sensor scrape.
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set cool_temp = params.BED_COOL_THRESHOLD|default(none) %}

    {% if cool_temp != none %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0    # bed off so it can cool
    {% endif %}
    
    # Home all four Z to the bottom (lever disengaged) and park the toolhead clear.
    RESPOND MSG="Positioning for bed scraping"
    Z_HOME_FOR_SCRAPE                             # home all four Z to the bottom
    G90
    SET_GCODE_VARIABLE MACRO=_HOME_Z_RAW VARIABLE=keep_bottom VALUE=1   # keep Z on the endstops while homing X/Y
    {% if 'y' not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}
    {% if 'x' not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_HOME_Z_RAW VARIABLE=keep_bottom VALUE=0
    G90
    {% if printer.toolhead.position.x != macro_vars.plug_pos_x or printer.toolhead.position.y != macro_vars.plug_pos_y %}
        G1 X{macro_vars.plug_pos_x} Y{macro_vars.plug_pos_y} F{macro_vars.speed_xy}
    {% endif %}
    RESPOND MSG="Ready for bed scraping"
    
    # Cool-down gate -- only after we're homed + parked ("ready for scrape").
    {% if cool_temp != none and printer.heater_bed.temperature > cool_temp|float %}
        RESPOND MSG="Waiting for bed to cool to {cool_temp} C"
        SET_FAN_SPEED FAN=bed_fans SPEED=1               # fans on only while actually cooling
        TEMPERATURE_WAIT SENSOR=heater_bed MAXIMUM={cool_temp|float}
        SET_FAN_SPEED FAN=bed_fans SPEED=0
    {% elif cool_temp != none %}
        RESPOND MSG="Bed already below {cool_temp} C; scraping now"
    {% else %}
        RESPOND MSG="No cool threshold given; scraping now"
    {% endif %}

    SCRAPE_BED_PROBE
    G28 Z

# Stuck-part prompt used as on_failed_gcode for SCRAPE_BED_PROBE. PAUSE makes it
# blocking: the print/job-queue stays held until Continue resumes it.
[gcode_macro _SCRAPE_FAIL_MENU]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Stuck Part!"
    RESPOND TYPE=command MSG="action:prompt_text Please clear the bed manually, then press Continue."
    RESPOND TYPE=command MSG="action:prompt_footer_button Continue|_SCRAPE_FAIL_CONTINUE|primary"
    RESPOND TYPE=command MSG="action:prompt_show"
    PAUSE

[gcode_macro _SCRAPE_FAIL_CONTINUE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if printer.pause_resume.is_paused %}      # guard so RESUME can't error when not paused
        RESUME
    {% endif %}


