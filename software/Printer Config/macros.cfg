# Runs per filament (Orca filament start G-code). Optionally overrides the
# surface and sets a filament-specific Z offset.
# Ex: FILAMENT_START [SURFACE="[curr_bed_type]"] [Z_OFFSET=-0.02]
[gcode_macro FILAMENT_START]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set ctx = printer["gcode_macro _PRINT_CTX"] %}
    {% set z_offset = params.Z_OFFSET|default(0)|float %}
    {% set raw = params.SURFACE|default("")|string %}

    # Filament-specific Z offset (absolute; PRINT_START zeroes it each print).
    SET_GCODE_OFFSET Z={z_offset}
    RESPOND MSG="Filament Z offset: {z_offset} mm"

    {% set adaptive = ctx.adaptive|int %}
    {% if raw != "" and not adaptive %}
        {% set surface = macro_vars.bed_type_map.get(raw, raw)|lower|replace(" ", "_") %}
        {% if surface != ctx.surface %}
            _FILAMENT_SURFACE_PROMPT SURFACE={surface} ORCA={ctx.surface}
        {% else %}
            RESPOND MSG="Filament surface matches the selected plate ({surface})."
        {% endif %}
    {% elif raw != "" and adaptive %}
        RESPOND MSG="Adaptive mesh on -- ignoring filament surface '{raw}'."
    {% endif %}

[gcode_macro _FILAMENT_SURFACE_PROMPT]
gcode:
    {% set surface = params.SURFACE|string %}
    {% set orca = params.ORCA|string %}
    RESPOND TYPE=command MSG="action:prompt_begin Surface Override"
    RESPOND TYPE=command MSG="action:prompt_text This filament requests surface '{surface}', but the plate selected in Orca is '{orca}'."
    RESPOND TYPE=command MSG="action:prompt_text Continue with '{surface}' (re-checks the mesh), or cancel the print?"
    RESPOND TYPE=command MSG="action:prompt_button_group_start"
    RESPOND TYPE=command MSG="action:prompt_button Continue|_FILAMENT_SURFACE_CONTINUE SURFACE={surface}|primary"
    RESPOND TYPE=command MSG="action:prompt_button Cancel print|_FILAMENT_SURFACE_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_button_group_end"
    RESPOND TYPE=command MSG="action:prompt_show"
    PAUSE

[gcode_macro _FILAMENT_SURFACE_CONTINUE]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% set surface = params.SURFACE|string %}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=surface VALUE="'{surface}'"   # adopt the override
    # Mid-print: already hot + leveled, so PREP=0; no re-purge, so PURGE=0.
    # _ENSURE_MESH resumes the print itself once the mesh is settled.
    _ENSURE_MESH PREP=0 PURGE=0

[gcode_macro _FILAMENT_SURFACE_CANCEL]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Surface mismatch -- cancelling print."
    CANCEL_PRINT


# Runs per filament at its end (Orca filament end G-code). Records whether
# PRINT_END should scrape the bed and the cool threshold to use.
# Ex: FILAMENT_END [SCRAPE_BED=1] [BED_COOL_THRESHOLD=35]
[gcode_macro FILAMENT_END]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set scrape = params.SCRAPE_BED|default(1)|string|lower in ("1", "true") %}
    {% set cool = params.BED_COOL_THRESHOLD|default(macro_vars.scrape_max_temp_threshold_default)|float %}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=scrape_bed VALUE={1 if scrape else 0}
    SET_GCODE_VARIABLE MACRO=_PRINT_CTX VARIABLE=bed_cool_threshold VALUE={cool}
    RESPOND MSG="Print-end scrape: {'on' if scrape else 'off'}{', cool to ' ~ (cool|round|int) ~ ' C' if scrape else ''}"


