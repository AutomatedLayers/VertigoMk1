[gcode_macro PRINT_END]
description: Runs at the end of each print. Scrape decision/threshold come from FILAMENT_END unless overridden. Example: PRINT_END [SCRAPE_BED=1 BED_COOL_THRESHOLD=35]
gcode:
    {% set macro_vars = printer["gcode_macro _MACRO_VARIABLES"] %}
    {% set ctx = printer["gcode_macro _PRINT_CTX"] %}
    {% set do_bed_scrape = params.SCRAPE_BED|default(ctx.scrape_bed)|string|lower %}
    {% set cool_temp = params.BED_COOL_THRESHOLD|default(ctx.bed_cool_threshold)|float %}
    {% set bottom_z = printer.configfile.settings.vertigo_z_homing.max_print_z|default(printer.toolhead.axis_maximum.z, true) %}
    {% set etemp = ctx.extruder_temp|float  %}
    
    G92 E0
    G1 E-2 F7200                                 # retract (hotend still hot here)
    G91
    G1 Z5 F{macro_vars.speed_z}                  # small hop before the wipe
 
    WIPE_PLUG EXTRUDER_TEMP={etemp}
    TURN_OFF_HEATERS
 
    # Move the bed toward the bottom (away from the part) for removal / scrape.
    G90
    G1 Z{bottom_z} F{macro_vars.speed_z}
 
    {% if do_bed_scrape in ("true", "1") %}
        # SCRAPE_BED parks the toolhead clear, cools to the threshold, then scrapes.
        SCRAPE_BED BED_COOL_THRESHOLD={cool_temp}
    {% endif %}


